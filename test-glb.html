<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GLB Test</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #error { color: red; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/addons/"
        }
    }
    </script>
</head>
<body>
    <div id="loading">Loading GLB model...</div>
    <div id="error"></div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0f4ff);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        const loader = new GLTFLoader();
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        console.log('Starting GLB load...');
        
        loader.load('model/avatar.glb', (gltf) => {
            console.log('GLB loaded successfully!');
            const avatar = gltf.scene;
            
            avatar.traverse((object) => {
                if (object.isMesh) {
                    object.castShadow = true;
                    object.receiveShadow = true;
                }
            });

            const box = new THREE.Box3().setFromObject(avatar);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxSize = Math.max(size.x, size.y, size.z);
            const scale = 2.5 / maxSize;
            
            avatar.scale.set(scale, scale, scale);
            avatar.position.y = -center.y * scale;
            avatar.rotation.y = Math.PI;
            
            scene.add(avatar);
            loadingEl.style.display = 'none';
            
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.016;
                
                if (avatar) {
                    const breathScale = 1 + Math.sin(time * 2) * 0.015;
                    avatar.scale.setScalar(breathScale);
                }
                
                renderer.render(scene, camera);
            }
            animate();
        }, (xhr) => {
            console.log('Loading progress:', Math.round((xhr.loaded / xhr.total) * 100) + '%');
        }, (error) => {
            console.error('GLB load error:', error);
            loadingEl.style.display = 'none';
            errorEl.textContent = 'Failed to load GLB model: ' + error.message;
        });
    </script>
</body>
</html>
