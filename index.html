<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浙江树人学院智慧校园AI平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义浅蓝校园风格样式 */
        .campus-gradient {
            background: linear-gradient(135deg, #e0f2fe 0%, #bfdbfe 50%, #93c5fd 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- 顶部导航栏 -->
    <nav class="bg-white/90 backdrop-blur-sm shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- 左侧标题 -->
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl mr-2">🎓</span>
                    <h1 class="text-xl font-bold text-blue-600">浙江树人学院智慧校园AI平台</h1>
                </div>
                <!-- 右侧导航按钮 -->
                <div class="hidden md:flex space-x-4">
                    <a href="pages/chat.html" class="px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 transition-colors font-medium">
                        AI问答
                    </a>
                    <a href="pages/score.html" class="px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 transition-colors font-medium">
                        成绩分析
                    </a>
                    <a href="pages/article.html" class="px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 transition-colors font-medium">
                        文案生成
                    </a>
                </div>
                <!-- 移动端汉堡菜单按钮 -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg text-blue-600 hover:bg-blue-50">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <!-- 移动端下拉菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-4 py-3 space-y-2">
                <a href="pages/chat.html" class="block px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 font-medium">AI问答</a>
                <a href="pages/score.html" class="block px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 font-medium">成绩分析</a>
                <a href="pages/article.html" class="block px-4 py-2 rounded-lg text-blue-600 hover:bg-blue-50 font-medium">文案生成</a>
            </div>
        </div>
    </nav>

    <!-- Banner横幅区域 -->
    <section class="campus-gradient py-12 md:py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-3xl md:text-5xl font-bold text-blue-800 mb-4">
                欢迎使用智慧校园AI平台
            </h2>
            <p class="text-lg md:text-xl text-blue-600 mb-8">
                基于人工智能技术，为树人学子提供智能问答、学情分析、文案生成等服务
            </p>
            <!-- Banner图片占位 -->
            <div class="mx-auto max-w-2xl">
                <img src="assets/img/banner.png" alt="校园AI插画" class="w-full rounded-2xl shadow-lg bg-white"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <!-- 图片加载失败时的占位显示 -->
                <div class="hidden w-full h-48 md:h-64 rounded-2xl shadow-lg bg-white/50 items-center justify-center">
                    <span class="text-blue-400 text-lg">🏫 校园插画</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 三大功能卡片区域 -->
    <section class="py-12 md:py-16 bg-white flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h3 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-10">
                核心功能
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">

                <!-- 卡片1：AI校园智能问答 -->
                <a href="pages/chat.html" class="block">
                    <div class="card-hover bg-white rounded-2xl shadow-md overflow-hidden border border-blue-100 h-full">
                        <div class="p-6 md:p-8 text-center">
                            <!-- 功能图标 -->
                            <div class="w-20 h-20 mx-auto mb-6 bg-blue-100 rounded-2xl flex items-center justify-center">
                                <img src="assets/img/chat-icon.png" alt="AI问答图标" class="w-12 h-12"
                                     onerror="this.style.display='none'; this.parentElement.innerHTML='💬';">
                            </div>
                            <h4 class="text-xl font-bold text-gray-800 mb-3">AI校园智能问答</h4>
                            <p class="text-gray-600 mb-4">
                                解答浙江树人学院相关问题，包括校园生活、教学安排、规章制度等各类咨询
                            </p>
                            <span class="inline-block px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                                立即体验 →
                            </span>
                        </div>
                    </div>
                </a>

                <!-- 卡片2：学业成绩数据分析 -->
                <a href="pages/score.html" class="block">
                    <div class="card-hover bg-white rounded-2xl shadow-md overflow-hidden border border-green-100 h-full">
                        <div class="p-6 md:p-8 text-center">
                            <!-- 功能图标 -->
                            <div class="w-20 h-20 mx-auto mb-6 bg-green-100 rounded-2xl flex items-center justify-center">
                                <img src="assets/img/score-icon.png" alt="成绩分析图标" class="w-12 h-12"
                                     onerror="this.style.display='none'; this.parentElement.innerHTML='📊';">
                            </div>
                            <h4 class="text-xl font-bold text-gray-800 mb-3">学业成绩数据分析</h4>
                            <p class="text-gray-600 mb-4">
                                上传Excel成绩单，AI智能分析学情，提供个性化学习建议与提升方案
                            </p>
                            <span class="inline-block px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">
                                立即体验 →
                            </span>
                        </div>
                    </div>
                </a>

                <!-- 卡片3：校园活动文案生成 -->
                <a href="pages/article.html" class="block">
                    <div class="card-hover bg-white rounded-2xl shadow-md overflow-hidden border border-purple-100 h-full">
                        <div class="p-6 md:p-8 text-center">
                            <!-- 功能图标 -->
                            <div class="w-20 h-20 mx-auto mb-6 bg-purple-100 rounded-2xl flex items-center justify-center">
                                <img src="assets/img/article-icon.png" alt="文案生成图标" class="w-12 h-12"
                                     onerror="this.style.display='none'; this.parentElement.innerHTML='📝';">
                            </div>
                            <h4 class="text-xl font-bold text-gray-800 mb-3">校园活动文案生成</h4>
                            <p class="text-gray-600 mb-4">
                                选择活动类型，一键生成宣传通知、社团简讯、朋友圈文案等多种风格
                            </p>
                            <span class="inline-block px-6 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition-colors">
                                立即体验 →
                            </span>
                        </div>
                    </div>
                </a>

            </div>
        </div>
    </section>

    <!-- 底部页脚 -->
    <footer class="bg-blue-600 text-white py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm">
                本项目是浙江树人学院《人工智能》课程大作业
            </p>
        </div>
    </footer>

    <!-- 移动端菜单交互脚本 -->
    <script>
        // 移动端汉堡菜单切换
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

</body>
</html>
